openapi: 3.0.0
info:
  title: Petstore API
  version: 1.0.0
  description: A sample API for managing pets
servers:
  - url: http://localhost:8000
    description: Development server

paths:
  /pets:
    get:
      summary: List all pets
      description: Returns a list of all pets in the store
      parameters:
        - name: limit
          in: query
          description: Maximum number of pets to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: status
          in: query
          description: Filter by pet status
          schema:
            type: string
            enum: [available, pending, sold]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid query parameters
        '500':
          description: Internal server error
    post:
      summary: Create a new pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetInput'
      responses:
        '201':
          description: Pet created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid input
        '500':
          description: Internal server error

  /pets/{petId}:
    get:
      summary: Get a pet by ID
      parameters:
        - name: petId
          in: path
          required: true
          description: ID of the pet to retrieve
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Pet not found
        '500':
          description: Internal server error
    delete:
      summary: Delete a pet by ID
      parameters:
        - name: petId
          in: path
          required: true
          description: ID of the pet to delete
          schema:
            type: integer
            minimum: 1
      responses:
        '204':
          description: Pet deleted successfully
        '404':
          description: Pet not found
        '500':
          description: Internal server error

  /pets/{petId}/vaccinations:
    post:
      summary: Add vaccination record to a pet
      parameters:
        - name: petId
          in: path
          required: true
          description: ID of the pet
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vaccine_name:
                  type: string
                date:
                  type: string
                  format: date
      responses:
        '201':
          description: Vaccination record added
        '400':
          description: Invalid input
        '404':
          description: Pet not found

components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          description: Unique identifier for the pet
        name:
          type: string
          description: Name of the pet
        status:
          type: string
          enum: [available, pending, sold]
        category:
          type: string
        price:
          type: number
          description: Price of the pet
          minimum: 0

    PetInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        status:
          type: string
          enum: [available, pending, sold]
        category:
          type: string
        price:
          type: number
          minimum: 0
          maximum: 10000
